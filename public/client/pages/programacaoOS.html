<div id="modalDataTransferencia" class="modal-overlay-data" style="display:none">
    <div class="modal-content-data">
        <button type="button" class="fechar-modal-data" aria-label="Fechar">&times;</button>
        <h3>Escolha as datas para a transferência</h3>

        <!-- ícone que abre o calendário -->
        <button id="abrirCalendario" type="button" class="icone-calendario" title="Selecionar datas">
            <i class="fa-solid fa-calendar-days"></i>
        </button>

        <!-- input oculto só para o flatpickr “viver” -->
        <input id="datasMultiHidden" type="text" aria-hidden="true"
            style="position:absolute;left:-9999px;opacity:0;width:0;height:0;border:0;padding:0;">

        <!-- pode remover se não quiser mostrar nada -->
        <!-- <div id="resumoDatas" class="texto-aux" style="display:none"></div> -->

        <button id="confirmarTransferencia" class="bt_padrao bt_cad">Confirmar</button>
    </div>
</div>


<div id="modalAnotacao" class="modal" style="display: none;">

    <div class="modal-conteudo modal_anotacao">

        <h2 id="modalTitulo">Anotações</h2>
        <label>Dia da anotação:</label>

        <input type="text" id="dataAnotacaoVisual" readonly class="campo-readonly" />

        <input type="hidden" id="datadiaAnot" />
        <label>Ícone:</label>

        <div id="iconeAnotacao" class="lista-icones">

            <!-- Geral -->
            <span data-icone="📌">📌</span>

            <!-- RH / Colaborador -->
            <span data-icone="🪪">🪪</span>
            <span data-icone="🎓">🎓</span>
            <span data-icone="🗳️">🗳️</span>
            <span data-icone="📝">📝</span>

            <!-- Segurança -->
            <span data-icone="🦺">🦺</span>
            <span data-icone="⚠️">⚠️</span>
            <span data-icone="🔒">🔒</span>

            <!-- Saúde -->
            <span data-icone="🩺">🩺</span>
            <span data-icone="💉">💉</span>
            <span data-icone="💊">💊</span>

            <!-- Engenharia / Elétrica -->
            <span data-icone="⚡">⚡</span>
            <span data-icone="🧰">🧰</span>

            <!-- Financeiro -->
            <span data-icone="💵">💵</span>

            <!-- Transporte -->
            <span data-icone="🚗">🚗</span>
            <span data-icone="🛻">🛻</span>

            <!-- Motivacional -->
            <span data-icone="🚀">🚀</span>
            <span data-icone="⭐">⭐</span>

        </div>

        <input type="hidden" id="datadiaAnot">

        <label>Texto:</label>

        <input type="text" id="anotacaoTexto">

        <button id="btnAdicionarAnotacao" class="bt_padrao bt_cad">
            + Adicionar anotação
        </button>

        <!-- LISTA -->
        <div class="lista-anotacoes">


        </div>

        <div class="modal-botoes">

            <button id="btnCancelarAnotacoes" class="bt_padrao bt_cancel">
                Cancelar
            </button>

        </div>

    </div>

</div>
